<!DOCTYPE html>
<html>

<head>
  <title>Conference Website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Welcome! to your Conference Website..</h1>
  <!-- Local video feed (muted to avoid echo) -->
  <video id="localVideo" autoplay muted playsinline></video>
  <video id="remoteVideo"autoplay playsinline></video>
  <div class="controls">
    <div id="startBtn">Start the Call</div>
    <div id="muteBtn">Mute the Call</div>
    <div id="hangupBtn">Hang Up</div>
  </div>
  <script src="client.js"></script>
</body>
</html>
